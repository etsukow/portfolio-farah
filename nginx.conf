server {
	listen 80;
	listen [::]:80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	add_header X-Content-Type-Options "nosniff" always;
	# Allow Julien's portfolio to embed this site in its live-demo iframe.
	# (frame-ancestors supersedes X-Frame-Options in modern browsers and, unlike
	#  XFO, can allow-list specific origins.)
	add_header Content-Security-Policy "frame-ancestors 'self' https://etsukow.com https://*.etsukow.com http://localhost:3000" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_comp_level 6;
	gzip_types
		text/plain
		text/css
		application/javascript
		application/json
		image/svg+xml
		font/woff2;

	# Next.js hashed chunks — cache indefinitely.
	location /_next/static/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
		access_log off;
		try_files $uri =404;
	}

	# Public assets (images, fonts).
	location ~* \.(?:woff2?|png|jpe?g|webp|gif|ico|svg)$ {
		add_header Cache-Control "public, max-age=2592000";
		access_log off;
		try_files $uri =404;
	}

	# Pages — never cache so deploys are picked up instantly.
	location / {
		expires -1;
		try_files $uri $uri/ $uri.html /index.html;
	}
}
